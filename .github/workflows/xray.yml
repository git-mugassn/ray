name: Permanent Xray Node

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-permanent-node]

permissions:
  contents: write
  actions: write

concurrency:
  group: permanent-ssh-node
  cancel-in-progress: true

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install OpenSSH
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y openssh-server curl openssl python3 unzip
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y openssh-server curl openssl python3 unzip
          else
            echo "Unsupported package manager"; exit 1
          fi

      - name: Configure SSH, start tunnels and save endpoints
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_TTL_MINUTES: "330"
          NODE_WEB_PORTS: "1130"
          NODE_PORT_PREFIXES: "1130:default"
          NODE_REGION_ID: "wdc"
        run: |
          set -euo pipefail

          TTL_MIN=${NODE_TTL_MINUTES:-60}
          TTL_SEC=$(( TTL_MIN * 60 ))
          PORT_LIST_STR="${NODE_WEB_PORTS:-}"
          PORT_PREFIXES_STR="${NODE_PORT_PREFIXES:-}"
          REGION_ID="${NODE_REGION_ID:-}"
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          SSH_SUBDOMAIN="${REGION_ID:+${REGION_ID}-}${REPO_NAME}"

          declare -A PORT_PREFIX_MAP
          if [ -n "$PORT_PREFIXES_STR" ]; then
            IFS=',' read -ra PREFIX_PAIRS <<< "$PORT_PREFIXES_STR"
            for pair in "${PREFIX_PAIRS[@]}"; do
              if [[ "$pair" =~ ^([0-9]+):([a-zA-Z0-9-]+)$ ]]; then
                PORT_PREFIX_MAP["${BASH_REMATCH[1]}"]="${BASH_REMATCH[2]}"
              fi
            done
          fi

          sudo mkdir -p /data && sudo chown $(whoami):$(whoami) /data && sudo chmod 755 /data

          printf "# Xray 节点\n# vless://6d756761-7373-6e61-9e7f-2a1b5d8c4f90@${REGION_ID:+${REGION_ID}-}default-${REPO_NAME}.mugassn.dpdns.org:443?type=ws&path=%%2Fmugassn&security=tls&host=${REGION_ID:+${REGION_ID}-}default-${REPO_NAME}.mugassn.dpdns.org#mugassn\n" > reboot.txt
          [ ! -f shut.txt ]   && printf "# 关机前可以在这里添加自定义关机命令\n# 例如：清理临时文件、保存配置等\n" > shut.txt
          [ ! -f backup.txt ] && printf "# 备份路径配置\n#\n# PATHS: /data\n" > backup.txt

          if [ -f backup.txt ] && [ -s backup.txt ]; then
            declare -A BACKUP_GROUPS
            CURRENT_PATH=""
            while IFS= read -r line; do
              if [[ "$line" =~ ^#[[:space:]]*路径:[[:space:]]*(.+)$ ]]; then
                CURRENT_PATH=$(echo "${BASH_REMATCH[1]}" | xargs); continue
              fi
              [[ -z "$line" || "$line" =~ ^# ]] && continue
              if [ -n "$CURRENT_PATH" ]; then
                FILENAME=$(echo "$line" | awk '{print $1}' | tr -d '\r')
                FILE_URL=$(echo "$line" | awk '{print $2}' | tr -d '\r')
                [ -n "$FILENAME" ] && [ -n "$FILE_URL" ] && {
                  [ -z "${BACKUP_GROUPS[$CURRENT_PATH]:-}" ] \
                    && BACKUP_GROUPS[$CURRENT_PATH]="$FILENAME|$FILE_URL" \
                    || BACKUP_GROUPS[$CURRENT_PATH]+=$'\x01'"$FILENAME|$FILE_URL"
                }
              fi
            done < backup.txt

            for restore_path in "${!BACKUP_GROUPS[@]}"; do
              echo ">>> Restoring: $restore_path"
              echo ">>> BACKUP_GROUPS value: ${BACKUP_GROUPS[$restore_path]}"
              IFS=$'\x01' read -ra FILES <<< "${BACKUP_GROUPS[$restore_path]}"
              FIRST_FILE=$(echo "${FILES[0]}" | cut -d'|' -f1)
              if [[ "$FIRST_FILE" =~ \.part[0-9]+\.tar\.gz$ ]]; then
                BASE_NAME=$(echo "$FIRST_FILE" | sed 's/\.part[0-9]*\.tar\.gz$//')
                cd /tmp; DOWNLOAD_SUCCESS=true; PART_COUNT=0
                for file_info in "${FILES[@]}"; do
                  FILENAME=$(echo "$file_info" | cut -d'|' -f1 | tr -d '\r')
                  FILE_URL=$(echo "$file_info" | cut -d'|' -f2 | tr -d '\r')
                  echo ">>> Downloading part: F='$FILENAME' U='$FILE_URL'"
                  if curl -L -o "$FILENAME" \
                    -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                    -H "Accept: application/octet-stream" \
                    "$FILE_URL"; then
                    SIZE=$(stat -c%s "$FILENAME" 2>/dev/null || echo 0)
                    echo ">>> Downloaded $FILENAME size=$SIZE"
                    [ "$SIZE" -lt 100 ] && { DOWNLOAD_SUCCESS=false; break; }
                    PART_COUNT=$((PART_COUNT + 1))
                  else
                    DOWNLOAD_SUCCESS=false; break
                  fi
                done
                if [ "$DOWNLOAD_SUCCESS" = true ] && [ "$PART_COUNT" -gt 0 ]; then
                  BACKUP_FILE="${BASE_NAME}.tar.gz"; > "$BACKUP_FILE"
                  for i in $(seq 1 "$PART_COUNT"); do
                    [ -f "${BASE_NAME}.part${i}.tar.gz" ] && { cat "${BASE_NAME}.part${i}.tar.gz" >> "$BACKUP_FILE"; rm -f "${BASE_NAME}.part${i}.tar.gz"; }
                  done
                  RESTORE_PARENT="$(dirname "$restore_path")"
                  sudo mkdir -p "$RESTORE_PARENT"
                  sudo tar -xzf "$BACKUP_FILE" -C "$RESTORE_PARENT" && sudo chown -R $(whoami):$(whoami) "$restore_path" 2>/dev/null || true
                  rm -f "$BACKUP_FILE"
                fi
                cd "$GITHUB_WORKSPACE"
              else
                FILENAME=$(echo "${FILES[0]}" | cut -d'|' -f1 | tr -d '\r')
                FILE_URL=$(echo "${FILES[0]}" | cut -d'|' -f2 | tr -d '\r')
                cd /tmp
                if curl -L -o "$FILENAME" \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -H "Accept: application/octet-stream" \
                  "$FILE_URL" && [ "$(stat -c%s "$FILENAME" 2>/dev/null || echo 0)" -ge 100 ]; then
                  RESTORE_PARENT="$(dirname "$restore_path")"
                  sudo mkdir -p "$RESTORE_PARENT"
                  sudo tar -xzf "$FILENAME" -C "$RESTORE_PARENT" && sudo chown -R $(whoami):$(whoami) "$restore_path" 2>/dev/null || true
                fi
                rm -f "$FILENAME"; cd "$GITHUB_WORKSPACE"
              fi
            done
          fi

          if [ -f reboot.txt ]; then
            grep -v '^[[:space:]]*#' "$GITHUB_WORKSPACE/reboot.txt" | grep -v '^[[:space:]]*$' > /tmp/_reboot_cmds.sh || true
            sudo bash /tmp/_reboot_cmds.sh || true
          fi

          ARCH="$(uname -m)"
          if [ "$ARCH" = "aarch64" ]; then
            XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/v26.3.23/Xray-linux-arm64-v8a.zip"
          else
            XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/v26.3.23/Xray-linux-64.zip"
          fi
          curl -L "$XRAY_URL" -o xray.zip
          unzip -o xray.zip
          printf '%s' '{"log":{"loglevel":"warning"},"inbounds":[{"port":1130,"listen":"127.0.0.1","protocol":"vless","settings":{"clients":[{"id":"6d756761-7373-6e61-9e7f-2a1b5d8c4f90"}],"decryption":"none"},"streamSettings":{"network":"ws","security":"none","wsSettings":{"path":"/mugassn"}}}],"outbounds":[{"protocol":"freedom"}]}' > config.json
          nohup sudo ./xray run -c config.json > xray.log 2>&1 &

          sudo mkdir -p /var/run/sshd

          ROOT_PASS=""
          [ -f ssh.txt ] && ROOT_PASS=$(grep -oP '(?<=password: ).+' ssh.txt 2>/dev/null || true)
          [ -z "$ROOT_PASS" ] && ROOT_PASS="$(openssl rand -base64 18 | tr -d '=+/' | head -c 16)"
          echo "root:${ROOT_PASS}" | sudo chpasswd

          if [ -d key ]; then
            sudo cp -f key/* /etc/ssh/
            sudo chmod 600 /etc/ssh/ssh_host_*_key
            sudo chmod 644 /etc/ssh/ssh_host_*_key.pub
          fi

          sudo sed -i 's/^#\?PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/^#\?PasswordAuthentication .*/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/^#\?KbdInteractiveAuthentication .*/KbdInteractiveAuthentication no/' /etc/ssh/sshd_config || true
          sudo hostnamectl set-hostname "Mugassn" 2>/dev/null || sudo hostname "Mugassn"

          sudo /usr/sbin/sshd -D -e &
          sleep 2

          if [ ! -d key ]; then
            mkdir -p key
            sudo cp /etc/ssh/ssh_host_*_key /etc/ssh/ssh_host_*_key.pub key/
            sudo chmod 644 key/*
          fi

          rm -f ssh.txt

          SERVEO_KEY_FILE="key.txt"
          SERVEO_FINGERPRINT_FILE="fingerprint.txt"
          SERVEO_PRIVATE_KEY="$HOME/.ssh/serveo_client_key"
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"

          if [ -f "$SERVEO_KEY_FILE" ]; then
            cat "$SERVEO_KEY_FILE" > "$SERVEO_PRIVATE_KEY" && chmod 600 "$SERVEO_PRIVATE_KEY"
            [ -f "$SERVEO_FINGERPRINT_FILE" ] && SERVEO_FINGERPRINT=$(cat "$SERVEO_FINGERPRINT_FILE")
          else
            ssh-keygen -t ed25519 -f "$SERVEO_PRIVATE_KEY" -N "" -C "serveo-client-${REPO_NAME}"
            SERVEO_FINGERPRINT=$(ssh-keygen -lf "$SERVEO_PRIVATE_KEY" | awk '{print $2}')
            cat "$SERVEO_PRIVATE_KEY" > "$SERVEO_KEY_FILE"
            echo "$SERVEO_FINGERPRINT" > "$SERVEO_FINGERPRINT_FILE"
            chmod 644 "$SERVEO_KEY_FILE" "$SERVEO_FINGERPRINT_FILE"
            git config user.name "permanent-node-automation"
            git config user.email "permanent-node-automation@noreply.local"
            git add "$SERVEO_KEY_FILE" "$SERVEO_FINGERPRINT_FILE" || true
            git commit -m "chore: add serveo client key and fingerprint" || true
            git pull --rebase "$REMOTE_URL" ${GITHUB_REF_NAME} || true
            git push "$REMOTE_URL" HEAD:${GITHUB_REF_NAME} || true
          fi

          declare -A PORT_DOMAINS
          PORT_DOMAINS_COUNT=0
          if [ -f web.txt ]; then
            while IFS= read -r line; do
              [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
              if [[ "$line" =~ ^([0-9]+)[[:space:]]+https?://([^[:space:]]+) ]]; then
                PORT_DOMAINS["${BASH_REMATCH[1]}"]="${BASH_REMATCH[2]}"
                PORT_DOMAINS_COUNT=$((PORT_DOMAINS_COUNT + 1))
              fi
            done < web.txt
          fi

          declare -A SUBDOMAINS_TO_CONFIGURE
          SUBDOMAIN_COUNT=0
          if [ "$PORT_DOMAINS_COUNT" -gt 0 ]; then
            for port in "${!PORT_DOMAINS[@]}"; do
              domain="${PORT_DOMAINS[$port]}"
              if [[ "$domain" =~ ^([^.]+)\.mugassn\.dpdns\.org$ ]]; then
                SUBDOMAINS_TO_CONFIGURE["${BASH_REMATCH[1]}"]=1
                SUBDOMAIN_COUNT=$((SUBDOMAIN_COUNT + 1))
              fi
            done
          else
            for port in "${!PORT_PREFIX_MAP[@]}"; do
              SUBDOMAINS_TO_CONFIGURE["${REGION_ID:+${REGION_ID}-}${PORT_PREFIX_MAP[$port]}-${REPO_NAME}"]=1
              SUBDOMAIN_COUNT=$((SUBDOMAIN_COUNT + 1))
            done
          fi

          if [ "$SUBDOMAIN_COUNT" -gt 0 ] && [ -n "${SERVEO_FINGERPRINT:-}" ]; then
            CF_API_TOKEN="yHCjTnrTBDdlXq8FBdUho9gmolBVb1cRO-HUrNjs"
            CF_ZONE_ID="1381075946420150b48ef98ef234ca0b"
            CF_DOMAIN="mugassn.dpdns.org"
            for subdomain in "${!SUBDOMAINS_TO_CONFIGURE[@]}"; do
              txt_record_name="_serveo-authkey.${subdomain}"
              full_domain="${txt_record_name}.${CF_DOMAIN}"
              CHECK_RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=TXT&name=${full_domain}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" || echo "")
              RECORD_ID=$(echo "$CHECK_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "")
              CF_DATA="{\"type\":\"TXT\",\"name\":\"${txt_record_name}\",\"content\":\"\\\"${SERVEO_FINGERPRINT}\\\"\",\"ttl\":300,\"proxied\":false}"
              if [ -n "$RECORD_ID" ]; then
                curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" -d "$CF_DATA" || true
              else
                curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                  -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" -d "$CF_DATA" || true
              fi
            done
            sleep 30
          fi

          printf "Host serveo.net\n    StrictHostKeyChecking no\n    UserKnownHostsFile /dev/null\n    ServerAliveInterval 60\n    ServerAliveCountMax 3\n    IdentityFile %s\n" "$SERVEO_PRIVATE_KEY" > ~/.ssh/config

          nohup ssh -i "$SERVEO_PRIVATE_KEY" -o StrictHostKeyChecking=no -o ServerAliveInterval=60 \
            -R "${SSH_SUBDOMAIN}:22:localhost:22" serveo.net > serveo_ssh.log 2>&1 &

          read -ra PORTS <<< "$PORT_LIST_STR"
          [ "${#PORTS[@]}" -eq 0 ] && [ "$PORT_DOMAINS_COUNT" -gt 0 ] && PORTS=("${!PORT_DOMAINS[@]}")

          for p in "${PORTS[@]}"; do
            p_trim="$(echo "$p" | xargs || true)"
            [ -z "$p_trim" ] && continue
            if [ "$PORT_DOMAINS_COUNT" -gt 0 ] && [ -n "${PORT_DOMAINS[$p_trim]:-}" ]; then
              DOMAIN="${PORT_DOMAINS[$p_trim]}"
            elif [ -n "${PORT_PREFIX_MAP[$p_trim]:-}" ]; then
              DOMAIN="${REGION_ID:+${REGION_ID}-}${PORT_PREFIX_MAP[$p_trim]}-${REPO_NAME}.mugassn.dpdns.org"
            else
              DOMAIN="${REGION_ID:+${REGION_ID}-}default-${REPO_NAME}.mugassn.dpdns.org"
            fi
            nohup ssh -i "$SERVEO_PRIVATE_KEY" -o StrictHostKeyChecking=no -o ServerAliveInterval=60 \
              -R "${DOMAIN}:80:localhost:${p_trim}" serveo.net > "serveo_${p_trim}.log" 2>&1 &
          done

          sleep 10

          { echo "ssh -J host.mugassn.dpdns.org root@${SSH_SUBDOMAIN}"; echo "password: ${ROOT_PASS}"; } > ssh.txt

          if [ ! -f web.txt ] && [ "${#PORTS[@]}" -gt 0 ]; then
            > web.txt
            for p in "${PORTS[@]}"; do
              p_trim="$(echo "$p" | xargs || true)"
              [ -z "$p_trim" ] && continue
              if [ -n "${PORT_PREFIX_MAP[$p_trim]:-}" ]; then
                SUBDOMAIN="${REGION_ID:+${REGION_ID}-}${PORT_PREFIX_MAP[$p_trim]}-${REPO_NAME}"
              else
                SUBDOMAIN="${REGION_ID:+${REGION_ID}-}default-${REPO_NAME}"
              fi
              echo "${p_trim} https://${SUBDOMAIN}.mugassn.dpdns.org" >> web.txt
            done
          fi

          if [ -n "${SERVEO_FINGERPRINT:-}" ] && ! grep -q "# Serveo SSH Key Fingerprint:" web.txt 2>/dev/null; then
            printf "\n# Serveo SSH Key Fingerprint:\n# %s\n" "$SERVEO_FINGERPRINT" >> web.txt
          fi

          XRAY_DOMAIN=$(grep "^1130 " web.txt 2>/dev/null | awk '{print $2}' | sed 's|https\?://||' | head -1 || true)
          if [ -n "$XRAY_DOMAIN" ]; then
            printf "# Xray 连接\n# vless://6d756761-7373-6e61-9e7f-2a1b5d8c4f90@${XRAY_DOMAIN}:443?type=ws&path=%%2Fmugassn&security=tls&host=${XRAY_DOMAIN}#mugassn\n" > reboot.txt
          fi

          git config user.name "permanent-node-automation"
          git config user.email "permanent-node-automation@noreply.local"
          for f in ssh.txt web.txt key/ key.txt fingerprint.txt reboot.txt shut.txt backup.txt; do
            [ -e "$f" ] && git add "$f" || true
          done
          git commit -m "chore: update permanent node endpoints $(date -u +%Y%m%dT%H%M%SZ)" || true
          git pull --rebase "$REMOTE_URL" ${GITHUB_REF_NAME} || true
          git push "$REMOTE_URL" HEAD:${GITHUB_REF_NAME} || true

          echo ">>> Permanent node ready! Running for ${TTL_MIN} minutes..."

          # ===== 清空 release 所有旧 asset =====
          clear_release_assets() {
            local RELEASE_TAG="backup"
            local RELEASE_INFO RELEASE_ID
            RELEASE_INFO=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" || echo "")
            RELEASE_ID=$(echo "$RELEASE_INFO" | grep -o '"id": *[0-9]*' | head -1 | grep -o '[0-9]*' || echo "")
            [ -z "$RELEASE_ID" ] && return 0
            local ASSETS
            ASSETS=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" || echo "")
            echo ">>> clear assets sample: ${ASSETS:0:200}" >&2
            local AIDS
            AIDS=$(echo "$ASSETS" | grep -o '/releases/assets/[0-9]*"' | grep -o '[0-9]*')
            echo ">>> aids to delete: $AIDS" >&2
            for aid in $AIDS; do
              echo ">>> deleting asset id: $aid" >&2
              curl -s -X DELETE -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${aid}" || true
            done
          }

          # ===== 上传单个文件到 release asset =====
          upload_to_release() {
            local FILE="$1"
            local ASSET_NAME="$(basename "$FILE")"
            local RELEASE_TAG="backup"

            local RELEASE_INFO
            RELEASE_INFO=$(curl -s \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" || echo "")
            local RELEASE_ID
            RELEASE_ID=$(echo "$RELEASE_INFO" | grep -o '"id": *[0-9]*' | head -1 | grep -o '[0-9]*' || echo "")

            if [ -z "$RELEASE_ID" ]; then
              local CREATE_RESP
              CREATE_RESP=$(curl -s -X POST \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
                -d "{\"tag_name\":\"${RELEASE_TAG}\",\"target_commitish\":\"${GITHUB_REF_NAME}\",\"name\":\"Backup\",\"body\":\"\",\"draft\":false,\"prerelease\":true}" || echo "")
              RELEASE_ID=$(echo "$CREATE_RESP" | grep -o '"id": *[0-9]*' | head -1 | grep -o '[0-9]*' || echo "")
            fi

            [ -z "$RELEASE_ID" ] && { echo "!!! Failed to get/create release" >&2; return 1; }

            # 删除同名旧 asset
            local ASSETS OLD_ID
            ASSETS=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" || echo "")
            OLD_ID=$(echo "$ASSETS" | grep -o '/releases/assets/[0-9]*' | grep -o '[0-9]*' | while read id; do
              NAME=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${id}" | grep -o '"name": *"[^"]*"' | head -1 | grep -o '"[^"]*"$' | tr -d '"' || echo "")
              [ "$NAME" = "$ASSET_NAME" ] && echo "$id" && break
            done | head -1 || echo "")
            if [ -n "$OLD_ID" ]; then
              curl -s -X DELETE -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${OLD_ID}" || true
              sleep 1
            fi

            # 上传
            local UPLOAD_RESP
            UPLOAD_RESP=$(curl -s -X POST \
              --max-time 300 \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              -T "$FILE" \
              "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ASSET_NAME}" 2>&1 || echo "")
            local DL_URL
            DL_URL=$(echo "$UPLOAD_RESP" | grep -o '"browser_download_url":"[^"]*"' | cut -d'"' -f4 || echo "")

            if [ -n "$DL_URL" ]; then
              echo "$DL_URL"
              return 0
            else
              echo "!!! Upload failed for $ASSET_NAME, response: $UPLOAD_RESP" >&2
              return 1
            fi
          }

          backup_data() {
            set +e
            # 拉取最新 backup.txt
            cd "$GITHUB_WORKSPACE"
            git pull --rebase "$REMOTE_URL" ${GITHUB_REF_NAME} 2>/dev/null || true
            PATHS_TO_BACKUP=()
            if [ -f "$GITHUB_WORKSPACE/backup.txt" ]; then
              while IFS= read -r line; do
                [[ "$line" =~ ^#[[:space:]]*PATHS:[[:space:]]*(.+)$ ]] && {
                  path=$(echo "${BASH_REMATCH[1]}" | xargs); PATHS_TO_BACKUP+=("${path/#\~/$HOME}")
                }
              done < "$GITHUB_WORKSPACE/backup.txt"
            fi
            [ ${#PATHS_TO_BACKUP[@]} -eq 0 ] && PATHS_TO_BACKUP=("/data")

            if [ -f "$GITHUB_WORKSPACE/backup.txt" ]; then
              grep "^# PATHS:" "$GITHUB_WORKSPACE/backup.txt" > "$GITHUB_WORKSPACE/backup.txt.tmp" 2>/dev/null || true
              [ -s "$GITHUB_WORKSPACE/backup.txt.tmp" ] && echo "" >> "$GITHUB_WORKSPACE/backup.txt.tmp"
              mv "$GITHUB_WORKSPACE/backup.txt.tmp" "$GITHUB_WORKSPACE/backup.txt"
            else
              > "$GITHUB_WORKSPACE/backup.txt"
            fi

            BACKUP_SUCCESS_COUNT=0
            for backup_path in "${PATHS_TO_BACKUP[@]}"; do
              sudo test -d "$backup_path" || { echo "!!! Path does not exist: $backup_path"; continue; }
              FILE_COUNT=$(sudo find "$backup_path" -type f 2>/dev/null | wc -l)
              echo ">>> $backup_path file count: $FILE_COUNT"
              sudo ls -la "$backup_path" 2>/dev/null || true
              [ "$FILE_COUNT" -eq 0 ] && { echo "!!! Path is empty: $backup_path"; continue; }

              PATH_NAME=$(echo "${backup_path/#\~/$HOME}" | sed 's|^/||' | tr '/' '_')
              BF="/tmp/${PATH_NAME}.tar.gz"
              sudo tar --warning=no-file-changed -czf "$BF" -C "$(dirname "$backup_path")" "$(basename "$backup_path")" 2>/dev/null || { echo "!!! Failed to create backup: $backup_path"; continue; }
              sudo chown "$(whoami):$(whoami)" "$BF" 2>/dev/null || true
              BS=$(stat -c%s "$BF" 2>/dev/null || echo "0")
              [ "$BS" -eq 0 ] && { rm -f "$BF"; continue; }

              # GitHub Release 单文件限制 2GB，超过则分片
              if (( $(echo "scale=2; $BS / 1024 / 1024 / 1024 > 1.9" | bc -l) )); then
                cd /tmp; split -b 1900M "$BF" "${BF}.part"; rm -f "$BF"
                PN=1
                for pf in "${PATH_NAME}.tar.gz".part*; do
                  [ -f "$pf" ] && { mv "$pf" "${PATH_NAME}.part${PN}.tar.gz"; PN=$((PN + 1)); }
                done
                printf "\n# 路径: %s\n" "$backup_path" >> "$GITHUB_WORKSPACE/backup.txt"
                US=true; PC=0
                for pf in ${PATH_NAME}.part*.tar.gz; do
                  [ -f "$pf" ] || continue; PC=$((PC + 1))
                  DU=$(upload_to_release "/tmp/$pf" || echo "")
                  [ -n "$DU" ] && echo "$(basename "$pf") $DU" >> "$GITHUB_WORKSPACE/backup.txt" || US=false
                  rm -f "/tmp/$pf"
                done
                [ "$US" = true ] && BACKUP_SUCCESS_COUNT=$((BACKUP_SUCCESS_COUNT + 1))
                cd "$GITHUB_WORKSPACE"
              else
                DU=$(upload_to_release "$BF" || echo "")
                [ -n "$DU" ] && {
                  printf "\n# 路径: %s\n%s %s\n" "$backup_path" "$(basename "$BF")" "$DU" >> "$GITHUB_WORKSPACE/backup.txt"
                  BACKUP_SUCCESS_COUNT=$((BACKUP_SUCCESS_COUNT + 1))
                }
                rm -f "$BF"
              fi
            done

            [ "$BACKUP_SUCCESS_COUNT" -gt 0 ] && {
              git add backup.txt || true
              git commit -m "chore: backup $(date -u +%Y%m%dT%H%M%SZ)" || true
              git push "$REMOTE_URL" HEAD:${GITHUB_REF_NAME} --force || true
            }
          }

          trap 'echo ">>> Termination signal, running backup..."; backup_data; exit 0' TERM INT

          ELAPSED=0
          while [ $ELAPSED -lt $TTL_SEC ]; do
            sleep 60 & wait $! || break
            ELAPSED=$((ELAPSED + 60))
            echo ">>> Running... ($((ELAPSED / 60)) / $TTL_MIN minutes elapsed)"
          done

          if [ -f shut.txt ]; then
            grep -v '^[[:space:]]*#' "$GITHUB_WORKSPACE/shut.txt" | grep -v '^[[:space:]]*$' > /tmp/_shut_cmds.sh || true
            sudo bash /tmp/_shut_cmds.sh || true
          fi

          backup_data

          sleep 60
          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
            -d '{"event_type":"restart-permanent-node"}' || true

          sleep 180
